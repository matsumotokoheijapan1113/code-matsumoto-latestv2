<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px; }
      .card { max-width: 520px; padding: 20px; border: 1px solid #ddd; border-radius: 12px; }
      button { padding: 10px 14px; border-radius: 10px; border: 0; cursor: pointer; }
      .ok { margin-top: 16px; padding: 12px; border-radius: 10px; background: #eefbf0; }
      .ng { margin-top: 16px; padding: 12px; border-radius: 10px; background: #fdeeee; }
      .muted { color: #666; font-size: 12px; margin-top: 8px; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>{{ title }}</h2>
      <p>ボタンを押すと SQS にメッセージを 1 件送信します。これは2つめのECSです。latestv2latestv2latestv2latestv2latestv2</p>

      <form action="/send" method="post">
        <button type="submit">メッセージ送信</button>
      </form>

      {% if result %}
        <div class="{% if '成功' in result %}ok{% else %}ng{% endif %}">
          <strong>{{ result }}</strong>
          {% if detail %}
            <div class="muted"><code>{{ detail }}</code></div>
          {% endif %}
        </div>
      {% endif %}

      <div class="muted">
        ※ 環境変数: <code>SQS_QUEUE_URL</code>（必須） / <code>AWS_REGION</code> / <code>SQS_MESSAGE_GROUP_ID</code>（FIFO用）
      </div>
    </div>
  </body>
</html>
